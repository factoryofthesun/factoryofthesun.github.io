<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css"><!--

  .outer {
    display: table;
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
  }
  
  .left {
    display: table-cell;
    width: 25%;
    background-color: #90D2EC;
  }
  
  .right {
    display: table-cell;
    width: 25%;
    right: 0;
    background-color: #90D2EC;
  }
  
  .middle {
    display: table-cell;
    vertical-align: middle;
    /*background-color: #FA7268;*/
    /*background-color: #90D2EC;*/
  }
  
  .inner {
    margin-left: auto;
    margin-right: auto;
    width: 800px;
  }
  
  .centergrid {
    display: grid; 
    justify-content: center; 
    align-content: center; 
    gap: 5px;
    grid-template: 150px 150px 150px / 150px 150px 150px; 
  }
  
  .grid-item {
    background-color: rgba(255, 255, 255, 0.8);
    border: 1px solid rgba(0, 0, 0, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    /*padding: 10px;*/
  }
  
  .nav {
    font-family: sans-serif;
    text-align: center;
    text-justify: newspaper;
    letter-spacing: 3px;
    font-size: 18px; 
    text-decoration: none;
    color: #214e64;
    margin:auto;
  }
  
  a {
    text-decoration: none;
    color: blue
  }
  
  a:visited {
    color: blue;
  }
  
  a:hover {
   color: #ff9898;
  }
  
  a:active {
    color: blue;
  }
  
  .image {
    position:relative;
    width:12%;
    display: inline-block;
  }
  
  .text {
    left: 0;
    position:absolute;
    text-align:center;
    top: 30px;
    width: 100%
  }

  h1 {
    font-family: sans-serif;
    text-justify: newspaper;
    letter-spacing: 3px;
    font-size: 34px; 
    text-decoration: none;
    margin:auto;
    padding-bottom: 10px;
    padding-left: 25px;
    color: #214e64;
  }
  
  p {
    font-family: sans-serif;
    text-justify: newspaper;
    letter-spacing: 1.5px;
    font-size: 16px; 
    text-decoration: none;
    margin:auto;
  }
  
  .sitetitle {
    font-family: sans-serif;
    text-align: center;
    text-justify: newspaper;
    letter-spacing: 2px;
    font-size: 45px; 
    text-decoration: none;
    color: #000000;
    margin:auto;
    padding-bottom:25px;
  }
  
  .subheader {
    font-family: sans-serif;
    text-align: center;
    text-justify: newspaper;
    letter-spacing: 2px;
    font-size: 18px; 
    text-decoration: none;
    color: #000000;
    margin:auto;
    padding-bottom:25px;
  }
  
  .dark {
      background-color: #214e64;
      color: #214e64;
  }
  .light {
      background-color: #ff9898;
  }
  .lighttext {
      color: #ff9898;
  }
  .medium {
      background-color: #c16172;
  }
  .mediumtext {
      color: #c16172;
  }
  
  /* 3JS */
  canvas {
  width: 100%;
  height: 100%;
  display: block;
  }
  
  *[data-selectionobj] {
  display: inline-block;
  width:100%;
  height:100%;
  }

.video-container {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
  height: 100%; 
  /*overflow: hidden;*/
}
.video-container video {
  /* Make video to at least 100% wide and tall */
  min-width: 100%; 
  min-height: 100%; 

  /* Setting width & height to auto prevents the browser from stretching or squishing the video */
  width: auto;
  height: auto;
  
  /* Center the video */
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}

.overlay {
  position:relative;
  text-align:center;
  right:300px;
  z-index:1;
}

.rightoverlay {
  position:relative;
  text-align:right;
  z-index:1;
}

.leftoverlay {
  position:relative;
  text-align:left;
  z-index:1;
}

  --></style>
<script>

  <video autoplay muted controls loop>
    <source src="images/hey.mp4" type="video/mp4"/>
  </video>
</div>
<div class="overlay">
  <img src="images/rabbit.gif" width="600px"/>
</div>
<div class="leftoverlay">
  <img src="images/newyearrabbit.gif" width="400px"/>
</div>
<div class="rightoverlay">
  <div style="margin-top:-400px;">
  <img src="images/chungustwerk.gif" width="400px"/>
</div>
<audio autoplay loop>
  <source src="images/hey.mp3">
</audio>
</body>
</html>
